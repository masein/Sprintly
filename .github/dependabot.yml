version: 2
updates:
  # Rust (workspace manifest + Cargo.lock at the repo root).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Hold all major bumps for a planned upgrade slot (handled manually).
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # hmac/hkdf are 0.x crates: dependabot classifies 0.12 -> 0.13 as a
      # semver-MINOR bump, so the wildcard above won't catch it. These releases
      # are breaking, so pin them explicitly until we do the upgrade slot.
      - dependency-name: "hmac"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "hkdf"
        update-types: ["version-update:semver-minor"]

  # Node / pnpm workspace (single pnpm-lock.yaml at the root covers all members).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Hold all major bumps for a planned upgrade slot (handled manually).
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
