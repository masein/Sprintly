# ─────────────────────────────────────────────────────────────────────────────
# Sprintly — dev stack.
#
# Everything you need to develop Sprintly locally. Caddy is the only
# public-facing thing on port 8080 — it routes / to the web container and
# /api + /ws to the api container. That mirrors prod, so the frontend never
# needs to know the API is on a different port.
#
# Volumes are named so `just down` keeps your data and `just reset` wipes it.
# Every service has a healthcheck. The `api` waits for postgres+redis+minio
# to be healthy before booting. `migrate` is a one-shot that runs SQLx
# migrations and exits 0.
# ─────────────────────────────────────────────────────────────────────────────

name: sprintly

services:
  # ─── Database ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Only expose to host in dev. Prod removes this.
    ports:
      - "127.0.0.1:5432:5432"

  # ─── Cache / pub-sub ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:6379:6379"

  # ─── Object storage (S3-compatible) ──────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "127.0.0.1:9000:9000"  # S3 API
      - "127.0.0.1:9001:9001"  # Console

  # ─── One-shot: create the bucket if it doesn't exist ─────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/${MINIO_BUCKET} &&
        mc anonymous set download local/${MINIO_BUCKET} || true &&
        echo 'MinIO bucket ready.'
      "
    restart: "no"

  # ─── One-shot: run SQLx migrations, then exit ────────────────────────────
  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
      target: runtime
    depends_on:
      postgres:
        condition: service_healthy
    # The image ENTRYPOINT is already the binary, so the command is just the
    # subcommand — repeating the binary path here would make argv[1] the path
    # and silently fall through to `serve`.
    command: ["migrate"]
    restart: "no"
    # NOTE: `migrate` shells out to the same binary, whose Config::from_env()
    # validates the full config up front — so it needs the same env as `api`,
    # not just DATABASE_URL.
    environment:
      SPRINTLY_ENV: ${SPRINTLY_ENV}
      SPRINTLY_PUBLIC_URL: ${SPRINTLY_PUBLIC_URL}
      SPRINTLY_API_BIND: ${SPRINTLY_API_BIND}
      SPRINTLY_OPEN_SIGNUP: ${SPRINTLY_OPEN_SIGNUP}
      SPRINTLY_JWT_SECRET: ${SPRINTLY_JWT_SECRET}
      SPRINTLY_ACCESS_TTL_SECS: ${SPRINTLY_ACCESS_TTL_SECS}
      SPRINTLY_REFRESH_TTL_SECS: ${SPRINTLY_REFRESH_TTL_SECS}
      SPRINTLY_ARGON2_M_COST_KIB: ${SPRINTLY_ARGON2_M_COST_KIB}
      SPRINTLY_ARGON2_T_COST: ${SPRINTLY_ARGON2_T_COST}
      SPRINTLY_ARGON2_P_COST: ${SPRINTLY_ARGON2_P_COST}
      SPRINTLY_VAULT_MASTER_KEY: ${SPRINTLY_VAULT_MASTER_KEY}
      SPRINTLY_VAULT_KEY_VERSION: ${SPRINTLY_VAULT_KEY_VERSION}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_REGION: ${MINIO_REGION}
      RUST_LOG: ${RUST_LOG}

  # ─── Rust API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      SPRINTLY_ENV: ${SPRINTLY_ENV}
      SPRINTLY_PUBLIC_URL: ${SPRINTLY_PUBLIC_URL}
      SPRINTLY_API_BIND: ${SPRINTLY_API_BIND}
      SPRINTLY_OPEN_SIGNUP: ${SPRINTLY_OPEN_SIGNUP}
      SPRINTLY_JWT_SECRET: ${SPRINTLY_JWT_SECRET}
      SPRINTLY_ACCESS_TTL_SECS: ${SPRINTLY_ACCESS_TTL_SECS}
      SPRINTLY_REFRESH_TTL_SECS: ${SPRINTLY_REFRESH_TTL_SECS}
      SPRINTLY_ARGON2_M_COST_KIB: ${SPRINTLY_ARGON2_M_COST_KIB}
      SPRINTLY_ARGON2_T_COST: ${SPRINTLY_ARGON2_T_COST}
      SPRINTLY_ARGON2_P_COST: ${SPRINTLY_ARGON2_P_COST}
      SPRINTLY_VAULT_MASTER_KEY: ${SPRINTLY_VAULT_MASTER_KEY}
      SPRINTLY_VAULT_KEY_VERSION: ${SPRINTLY_VAULT_KEY_VERSION}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_REGION: ${MINIO_REGION}
      RUST_LOG: ${RUST_LOG}
    healthcheck:
      test: ["CMD", "/usr/local/bin/sprintly-api", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    # No host port — Caddy fronts everything. Uncomment for direct API access.
    # ports:
    #   - "127.0.0.1:8081:8081"

  # ─── Next.js web ─────────────────────────────────────────────────────────
  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ─── Reverse proxy ───────────────────────────────────────────────────────
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL}
    volumes:
      - ../docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "8080:80"
      - "8443:443"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/v1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Dev tooling (profile: tools) ────────────────────────────────────────
  # Not started by `just up`. `just test` / `just lint` / `just sqlx-prepare`
  # use `compose --profile tools run --rm` to get a one-shot toolchain wired to
  # the running Postgres/Redis, with the source and build cache mounted.
  api-tools:
    profiles: ["tools"]
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
      target: tools
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SQLX_OFFLINE: "false"
      CARGO_TERM_COLOR: always
    working_dir: /app/apps/api
    volumes:
      - ../../apps/api:/app/apps/api
      - ../../Cargo.toml:/app/Cargo.toml
      - ../../Cargo.lock:/app/Cargo.lock
      - cargo_target:/app/target
      - cargo_registry:/usr/local/cargo/registry

  web-tools:
    profiles: ["tools"]
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../../:/app
      - web_tools_modules:/app/apps/web/node_modules

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
  cargo_target:
  cargo_registry:
  web_tools_modules:
